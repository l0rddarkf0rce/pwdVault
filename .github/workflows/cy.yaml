# .github/workflows/ci.yml
name: CI

# Trigger on pushes, PRs and when a tag is created
on:
  push:
    branches: [ main, master, '**' ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    # Run the job on Ubuntu (the most common runner)
    runs-on: ubuntu-latest

    # Create a matrix of Python versions you want to test against
    strategy:
      matrix:
        python-version: [ "3.8", "3.9", "3.10", "3.11", "3.12" ]

    steps:
      # -----------------------------------------------------------------
      # Checkout the repository
      # -----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # Set up the requested Python version
      # -----------------------------------------------------------------
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"                     # enables pip cache automatically

      # -----------------------------------------------------------------
      # Upgrade pip and install the dependencies
      # -----------------------------------------------------------------
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      # -----------------------------------------------------------------
      # Install development‑only dependencies (tests, linters, etc.)
      # -----------------------------------------------------------------
      - name: Install development dependencies
        # If you do NOT have a requirements‑dev.txt, remove this step.
        run: |
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      # -----------------------------------------------------------------
      # Run the test suite
      # -----------------------------------------------------------------
      - name: Run pytest
        run: |
          # -q = quiet, -vv = very verbose (feel free to adjust)
          pytest -q -vv
